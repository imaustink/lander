<!doctype html>
<html>
  <head>
    <title>Moon Lander</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        background: #0d1117;
        color: #e6edf3;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }

      /* ── Header ── */
      #header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 20px;
        height: 48px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        flex-shrink: 0;
      }
      #header-icon {
        font-size: 18px;
        line-height: 1;
      }
      #header h1 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: #e6edf3;
      }
      #header-badge {
        margin-left: auto;
        font-size: 11px;
        color: #8b949e;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 2px 10px;
        letter-spacing: 0.4px;
      }

      /* ── Main split layout ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        display: flex;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
        min-width: 0;
      }
      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 14px;
        height: 36px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        font-size: 11px;
        font-weight: 600;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        flex-shrink: 0;
        user-select: none;
      }
      .panel-header-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #30363d;
        margin-right: 8px;
        transition: background 0.2s;
      }
      .panel-header-dot.active {
        background: #3fb950;
        box-shadow: 0 0 6px #3fb95066;
      }
      .panel-title {
        display: flex;
        align-items: center;
      }

      /* ── Divider ── */
      #divider {
        width: 1px;
        background: #30363d;
        flex-shrink: 0;
      }

      /* ── Game panel ── */
      #game-container {
        flex: 1;
        overflow: hidden;
        background: #010409;
        position: relative;
      }
      #game-placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      #game-placeholder svg {
        color: #21262d;
      }
      #game-placeholder p {
        font-size: 13px;
        color: #484f58;
        letter-spacing: 0.2px;
      }
      #game-container iframe {
        border: none;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ── Editor panel ── */
      #editor {
        flex: 1;
        overflow: hidden;
      }

      /* ── Run button ── */
      #run {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 14px;
        background: #238636;
        color: #ffffff;
        border: 1px solid rgba(240, 246, 252, 0.1);
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s;
        outline: none;
      }
      #run:hover {
        background: #2ea043;
        box-shadow: 0 0 8px #2ea04344;
      }
      #run:active {
        background: #1a7f37;
      }
      #run:focus-visible {
        box-shadow: 0 0 0 3px #238636aa;
      }
    </style>
    <script src="/vs/loader.js"></script>
  </head>
  <body>
    <div id="header">
      <span id="header-icon">🚀</span>
      <h1>Moon Lander</h1>
      <span id="header-badge">JavaScript Sandbox</span>
    </div>
    <div id="main">
      <div class="panel" id="game-panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="panel-header-dot" id="game-dot"></div>
            Preview
          </div>
        </div>
        <div id="game-container">
          <div id="game-placeholder">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2C8 2 5 6 5 11l7 9 7-9C19 6 16 2 12 2z"/>
              <circle cx="12" cy="9.5" r="2"/>
              <path d="M8 17.5c-1 .5-2 1.5-3 3.5M16 17.5c1 .5 2 1.5 3 3.5"/>
            </svg>
            <p>Press <strong style="color:#8b949e">Run</strong> to launch the simulation</p>
          </div>
        </div>
      </div>
      <div id="divider"></div>
      <div class="panel" id="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <div class="panel-header-dot"></div>
            Code
          </div>
          <button id="run" type="button">&#9654;&nbsp; Run</button>
        </div>
        <div id="editor"></div>
      </div>
    </div>
    <script src="./src/editor.ts" type="module"></script>
  </body>
</html>
